<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة الطلاب 📊</title>
<style>
body { font-family: Arial; text-align: center; background: linear-gradient(to bottom,#a0e1ff,#ffffff); padding: 30px; }
h1 { color:#0066cc; }
input { padding:12px; width:260px; font-size:18px; border-radius:8px; border:1px solid #ccc; }
button { padding:12px 25px; font-size:18px; background-color:#0066cc; color:white; border:none; border-radius:8px; cursor:pointer; margin-left:10px; }
button:hover { background-color:#004d99; }
#result { margin-top:20px; font-size:20px; color:#003366; font-weight:bold; }
</style>
</head>
<body>

<h1>استعلام نتيجة الطالب 📊</h1>
<input type="number" id="seatNumber" placeholder="اكتب رقم الطالب">
<button onclick="showResult()">عرض النتيجة</button>
<div id="result"></div>

<script>
// البيانات مشفرة لتقليل إمكانية التعديل
(function(){
  var students={};
  students[atob("MQ==")]={n:atob("2KfZhNmB2KfZhNmB2KfYqiDZg9mI2Ykg2KfZhNmB"),g:330};
  students[atob("Mg==")]={n:atob("2KfZhNmF2KfYp9mF2LnZh9mG"),g:300};
  students[atob("Mw==")]={n:atob("2KfZhNin2YbYqQ=="),g:400};
  students[atob("NA==")]={n:atob("2YbYqtmC2YrYqg=="),g:500};

  window.showResult=function(){
    var seat=document.getElementById("seatNumber").value.trim();
    var r=document.getElementById("result");
    if(students[seat]) r.innerHTML="✅ الاسم: "+students[seat].n+"<br>📊 الدرجة: "+students[seat].g;
    else if(seat!=="") r.innerHTML="❌ رقم الطالب غير صحيح";
    else r.innerHTML="";
  };
})();
</script>

</body>
</html>
